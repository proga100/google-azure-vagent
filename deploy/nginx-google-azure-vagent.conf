# nginx vhost template for the public demo at google-azure-vagent.flance.info
# (mirrors the existing yandex-nigora.flance.info RunCloud setup).
#
# Serves the static client and proxies the WebSocket to the backend container.
# TLS is terminated here (use certbot / RunCloud SSL). Deploy is a follow-up step;
# confirm the exact subdomain spelling before issuing the certificate.

server {
    listen 80;
    server_name google-azure-vagent.flance.info;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name google-azure-vagent.flance.info;

    # ssl_certificate     /etc/letsencrypt/live/google-azure-vagent.flance.info/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/google-azure-vagent.flance.info/privkey.pem;

    # Static demo client (frontend/test-client served on the host, or copied here).
    root /opt/google-azure-vagent/frontend/test-client;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket → backend (uvicorn on :8013 inside the container/host).
    location /ws/voice {
        proxy_pass http://127.0.0.1:8013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # long-lived voice sessions
        proxy_send_timeout 3600s;
    }

    # Health/info for the client's pipeline panel.
    location /health {
        proxy_pass http://127.0.0.1:8013;
        proxy_set_header Host $host;
    }
}

# Notes:
# - The client's WS URL must point at wss://google-azure-vagent.flance.info/ws/voice
#   (set it in frontend/test-client/index.html #url default before deploying).
# - Backend .env on the server holds GEMINI_API_KEY + AZURE_SPEECH_KEY (never committed).
# - Keep DEMO_WORD_LIMIT / DEMO_MAX_CONCURRENT_SESSIONS set to bound public cost.
