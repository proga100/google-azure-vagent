# RunCloud nginx vhost for google-azure-vagent.flance.info
# Install as /etc/nginx-rc/conf.d/google-azure-vagent-flance-info.conf
# (mirrors the yandex-nigora vhost on the same box). Static client served from
# /opt/google-azure-vagent/frontend/test-client; /ws/voice proxied to the
# backend container on 127.0.0.1:8013. Issue the cert AFTER the DNS A record
# (google-azure-vagent.flance.info -> 217.216.49.28) resolves.

map $http_upgrade $gav_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name google-azure-vagent.flance.info;
    listen 80;
    listen [::]:80;

    location ~ /.well-known/acme-challenge {
        auth_basic off;
        allow all;
        log_not_found off;
        root /opt/RunCloud/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name google-azure-vagent.flance.info;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/google-azure-vagent.flance.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/google-azure-vagent.flance.info/privkey.pem;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM";
    ssl_ecdh_curve secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_dhparam /etc/nginx-rc/dhparam.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static demo client (synced repo).
    root /opt/google-azure-vagent/frontend/test-client;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # WebSocket voice stream -> backend container.
    location /ws/voice {
        proxy_pass http://127.0.0.1:8013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $gav_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8013;
        proxy_set_header Host $host;
    }
}
