# Google Uzbek voice agent (Gemini Live + Cloud STT uz-UZ) — MVP stack.
# No Postgres: the pipeline is stateless per call.
services:
  backend:
    build: ./backend
    ports:
      - "8012:8012"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8012 --reload

  # Plain static test client (AudioWorklet mic + WebAudio playback).
  # Served by any static file server; python http.server keeps it dependency-free.
  frontend:
    image: python:3.12-slim
    working_dir: /srv
    ports:
      - "3010:3010"
    volumes:
      - ./frontend/test-client:/srv
    command: python -m http.server 3010
