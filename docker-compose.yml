# Google + Azure English voice-agent demo (Gemini Live + Azure Neural TTS).
# Stateless per call. Public demo; cost guards live in the app.
services:
  backend:
    build: ./backend
    ports:
      - "8013:8013"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8013 --reload

  # Static demo client (AudioWorklet mic + WebAudio playback + canvas orb).
  frontend:
    image: python:3.12-slim
    working_dir: /srv
    ports:
      - "3011:3011"
    volumes:
      - ./frontend/test-client:/srv
    command: python -m http.server 3011
